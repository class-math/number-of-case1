<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実験して発見しよう！確率シミュレーター（保存機能付き）</title>
    <style>
        :root {
            --red: #ff4d4d;
            --yellow: #ffd43b;
            --blue: #4dabf7;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; text-align: center; color: #343a40; margin-bottom: 20px; }

        .settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .input-group label { font-weight: bold; font-size: 16px; }
        input[type="number"] { width: 60px; font-size: 18px; padding: 5px; border-radius: 5px; border: 1px solid #ced4da; text-align: center; }

        .mode-selector {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-top: 15px;
            border-top: 2px dashed #dee2e6;
        }

        .mode-btn {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #dee2e6;
            border-radius: 30px;
            cursor: pointer;
            background: white;
        }

        .mode-btn.active {
            background-color: #228be6;
            color: white;
            border-color: #228be6;
            box-shadow: 0 4px 12px rgba(34,139,230,0.3);
        }

        .machine-visual {
            border: 3px solid #dee2e6;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            background-color: #fff;
        }

        .ball-pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; min-height: 45px; }

        .ball {
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 14px;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2);
        }

        .ball-1 { background-color: var(--red); }
        .ball-2 { background-color: var(--yellow); color: #333; }
        .ball-0 { background-color: var(--blue); }

        .draw-action { text-align: center; margin-bottom: 20px; min-height: 70px; }
        
        .main-btn {
            background-color: #fab005; color: white;
            border: none; padding: 18px 50px; font-size: 24px;
            font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 0 #f08c00;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #f08c00; }
        .main-btn.next-step { background-color: #e8590c; box-shadow: 0 5px 0 #b03a00; }
        .main-btn.reset-step { background-color: #12b886; box-shadow: 0 5px 0 #0ca678; }

        .result-display {
            display: flex; justify-content: center; gap: 60px;
            min-height: 140px; align-items: center;
            background: #f1f3f5; border-radius: 15px;
            border: 2px solid #dee2e6;
        }

        .hand { text-align: center; width: 140px; }
        .hand-label { font-size: 16px; color: #495057; margin-top: 10px; font-weight: bold; }
        
        .picked-ball {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid white; display: flex; align-items: center;
            justify-content: center; font-size: 24px; font-weight: bold;
            color: white; margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .ball-hidden { background: #ced4da; color: #868e96; box-shadow: none; border: 4px dashed #adb5bd; }

        @keyframes pop { 0% { transform: scale(0); } 90% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.3s ease-out forwards; }

        /* 実験データ */
        .math-card {
            background-color: #fff9db; border-left: 6px solid #fab005;
            padding: 20px; border-radius: 10px; margin-top: 20px;
        }
        .math-card.completed {
            background-color: #e7f5ff; border-left: 6px solid #228be6;
        }

        .math-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .math-table th, .math-table td { border: 1px solid #dee2e6; padding: 12px; text-align: center; font-size: 16px; }
        .math-table th { background-color: #f8f9fa; }

        .empty-row-text { color: #adb5bd; font-style: italic; }

        .congratulations {
            display: none; background: #228be6; color: white;
            padding: 15px; border-radius: 8px; font-weight: bold;
            text-align: center; margin-bottom: 15px; font-size: 20px;
            animation: pop 0.5s ease-out;
        }

        .system-actions {
            margin-top: 30px;
            text-align: center;
            border-top: 2px dashed #dee2e6;
            padding-top: 15px;
        }
        .clear-data-btn {
            background-color: #e03131; color: white; border: none;
            padding: 8px 16px; font-size: 14px; border-radius: 5px;
            cursor: pointer; font-weight: bold;
        }
        .clear-data-btn:hover { background-color: #c92a2a; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>実験して発見しよう！ガチャガチャ数学</h1>

    <div class="settings">
        <div>
            <div class="input-group">
                <label>🔴 1等（赤）：</label>
                <input type="number" id="count-red" value="2" min="0" max="6" onchange="resetConfig()">
            </div>
            <div class="input-group">
                <label>🟡 2等（黄）：</label>
                <input type="number" id="count-yellow" value="2" min="0" max="6" onchange="resetConfig()">
            </div>
            <div class="input-group">
                <label>🔵 はずれ（青）：</label>
                <input type="number" id="count-blue" value="2" min="0" max="6" onchange="resetConfig()">
            </div>
        </div>

        <div class="mode-selector">
            <button id="btn-p" class="mode-btn active" onclick="setMode('P')">右手 ➔ 左手（順番に）</button>
            <button id="btn-c" class="mode-btn" onclick="setMode('C')">同時に2個（いっしょに）</button>
        </div>
    </div>

    <div class="machine-visual">
        <strong>ガチャの中身（合計 <span id="total-balls">0</span> 個）</strong>
        <div id="ball-pool" class="ball-pool"></div>
    </div>

    <div class="draw-action">
        <button id="action-btn" class="main-btn" onclick="handleButtonClick()">ガチャをまわす！</button>
    </div>

    <div class="result-display">
        <div class="hand">
            <div id="ball-1" class="picked-ball ball-hidden">?</div>
            <div class="hand-label" id="label-1">右手 (1回目)</div>
        </div>
        <div class="hand">
            <div id="ball-2" class="picked-ball ball-hidden">?</div>
            <div class="hand-label" id="label-2">左手 (2回目)</div>
        </div>
    </div>

    <div id="math-card-box" class="math-card">
        <div id="cong-message" class="congratulations">🎉 すごい！ぜんぶの組み合わせを みつけたよ！本当の「出やすさ」をチェックしよう！</div>
        <strong>📊 どんな組み合わせがあるかな？ （みつけた種類： <span id="found-count">0</span> / <span id="max-patterns">0</span>）</strong><br>
        <p id="mode-desc">ガチャをまわすと、新しく見つかった結果が下の表にどんどん追加されていくよ！</p>
        
        <table class="math-table">
            <thead>
                <tr id="table-header"></tr>
            </thead>
            <tbody id="stat-table">
                <tr><td colspan="3" class="empty-row-text">ガチャをまわすと、ここにデータが追加されます</td></tr>
            </tbody>
        </table>
    </div>

    <div class="system-actions">
        <button class="clear-data-btn" onclick="clearSavedData()">データをすべて消す（はじめから実験する）</button>
    </div>
</div>

<script>
    let currentMode = 'P'; 
    let stepState = 0;     
    let ballData = [];     
    let selectedBall1 = null;
    let selectedBall2 = null;

    let activePatterns = [];
    let foundPatterns = []; // ここがローカルストレージと連動します

    // アプリの起動処理
    function initApp() {
        // 保存されている設定やモードを復元（なければデフォルト）
        currentMode = localStorage.getItem('gacha_currentMode') || 'P';
        document.getElementById('count-red').value = localStorage.getItem('gacha_countRed') || '2';
        document.getElementById('count-yellow').value = localStorage.getItem('gacha_countYellow') || '2';
        document.getElementById('count-blue').value = localStorage.getItem('gacha_countBlue') || '2';

        // 視覚的なモードボタンの切り替え
        document.getElementById('btn-p').classList.toggle('active', currentMode === 'P');
        document.getElementById('btn-c').classList.toggle('active', currentMode === 'C');
        updateLabelsByMode();

        const r = parseInt(document.getElementById('count-red').value) || 0;
        const y = parseInt(document.getElementById('count-yellow').value) || 0;
        const b = parseInt(document.getElementById('count-blue').value) || 0;
        
        // ガチャの中身の生成
        const pool = document.getElementById('ball-pool');
        pool.innerHTML = '';
        ballData = [];
        addBalls(r, '1等', 'ball-1');
        addBalls(y, '2等', 'ball-2');
        addBalls(b, 'はずれ', 'ball-0');
        document.getElementById('total-balls').innerText = ballData.length;
        
        // パターン定義の生成
        buildPatternList(r, y, b);

        // 保存された「発見済みデータ」の読み込み
        const savedFound = localStorage.getItem(`gacha_foundPatterns_${currentMode}_${r}_${y}_${b}`);
        if (savedFound) {
            foundPatterns = JSON.parse(savedFound);
        } else {
            foundPatterns = [];
        }

        updateTableHeader();
        renderTable();
        updateButtonText();
    }

    function addBalls(count, name, css) {
        for(let i=0; i<count; i++) {
            ballData.push({name: name, css: css});
            const div = document.createElement('div');
            div.className = 'ball ' + css;
            div.innerText = name.charAt(0);
            document.getElementById('ball-pool').appendChild(div);
        }
    }

    function buildPatternList(r, y, b) {
        activePatterns = [];
        if(currentMode === 'P') {
            if(r >= 2) activePatterns.push('1等|1等');
            if(y >= 2) activePatterns.push('2等|2等');
            if(b >= 2) activePatterns.push('はずれ|はずれ');
            if(r >= 1 && y >= 1) { activePatterns.push('1等|2等'); activePatterns.push('2等|1等'); }
            if(r >= 1 && b >= 1) { activePatterns.push('1等|はずれ'); activePatterns.push('はずれ|1等'); }
            if(y >= 1 && b >= 1) { activePatterns.push('2等|はずれ'); activePatterns.push('はずれ|2等'); }
        } else {
            if(r >= 2) activePatterns.push('1等 と 1等');
            if(y >= 2) activePatterns.push('2等 と 2等');
            if(b >= 2) activePatterns.push('はずれ と はずれ');
            if(r >= 1 && y >= 1) activePatterns.push('1等 と 2等');
            if(r >= 1 && b >= 1) activePatterns.push('1等 と はずれ');
            if(y >= 1 && b >= 1) activePatterns.push('2等 と はずれ');
        }
        document.getElementById('max-patterns').innerText = activePatterns.length;
    }

    function updateLabelsByMode() {
        if(currentMode === 'P') {
            document.getElementById('mode-desc').innerText = "順番を区別します。右手と左手でちがう色が出るペアをすべて見つけよう！";
            document.getElementById('label-1').innerText = "右手 (1回目)";
            document.getElementById('label-2').innerText = "左手 (2回目)";
        } else {
            document.getElementById('mode-desc').innerText = "順番は関係ありません。2個の色の組み合わせをすべて見つけよう！";
            document.getElementById('label-1').innerText = "セットの1つめ";
            document.getElementById('label-2').innerText = "セットの2つめ";
        }
    }

    function updateTableHeader() {
        const header = document.getElementById('table-header');
        if(currentMode === 'P') {
            header.innerHTML = `<th>右手（1回目）</th><th>左手（2回目）</th><th>本当の「出やすさ」（答え）</th>`;
        } else {
            header.innerHTML = `<th colspan="2">出た2個の組み合わせ</th><th>本当の「出やすさ」（答え）</th>`;
        }
    }

    function updateButtonText() {
        const btn = document.getElementById('action-btn');
        if (stepState === 0) {
            btn.className = 'main-btn';
            btn.innerText = (currentMode === 'P') ? "① 右手をまわす！" : "2個同時にまわす！";
        } else if (stepState === 1) {
            btn.className = 'main-btn next-step';
            btn.innerText = "② 左手をまわす！";
        } else if (stepState === 2) {
            btn.className = 'main-btn reset-step';
            btn.innerText = "再度引く";
        }
    }

    // 設定値が変わったら保存して再起動
    function resetConfig() {
        localStorage.setItem('gacha_countRed', document.getElementById('count-red').value);
        localStorage.setItem('gacha_countYellow', document.getElementById('count-yellow').value);
        localStorage.setItem('gacha_countBlue', document.getElementById('count-blue').value);
        
        stepState = 0;
        clearHands();
        initApp();
    }

    // モードボタンが押されたとき
    function setMode(mode) {
        currentMode = mode;
        localStorage.setItem('gacha_currentMode', mode);
        stepState = 0;
        clearHands();
        initApp();
    }

    // データの完全消去
    function clearSavedData() {
        if(confirm("これまでの実験データをすべて消去して、最初からやり直しますか？")) {
            localStorage.clear();
            stepState = 0;
            clearHands();
            initApp();
        }
    }

    function renderTable() {
        const tbody = document.getElementById('stat-table');
        const r = parseInt(document.getElementById('count-red').value) || 0;
        const y = parseInt(document.getElementById('count-yellow').value) || 0;
        const b = parseInt(document.getElementById('count-blue').value) || 0;
        
        if (foundPatterns.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" class="empty-row-text">ガチャをまわすと、ここにデータが追加されます</td></tr>`;
            document.getElementById('found-count').innerText = 0;
            document.getElementById('cong-message').style.display = 'none';
            document.getElementById('math-card-box').classList.remove('completed');
            return;
        }

        const isAllCompleted = foundPatterns.length === activePatterns.length;

        let html = '';
        foundPatterns.forEach(p => {
            let col1 = '', col2 = '', answerText = "？？ 通り";
            if (currentMode === 'P') {
                const parts = p.split('|'); col1 = parts[0]; col2 = parts[1];
            } else {
                const parts = p.split(' と '); col1 = parts[0]; col2 = parts[1];
            }

            if (isAllCompleted) {
                let calc = 0;
                if (currentMode === 'P') {
                    if(p==='1等|1等') calc = r*(r-1);
                    else if(p==='2等|2等') calc = y*(y-1);
                    else if(p==='はずれ|はずれ') calc = b*(b-1);
                    else if(p==='1等|2等' || p==='2等|1等') calc = r*y;
                    else if(p==='1等|はずれ' || p==='はずれ|1等') calc = r*b;
                    else if(p==='2等|はずれ' || p==='はずれ|2等') calc = y*b;
                } else {
                    if(p==='1等 と 1等') calc = (r*(r-1))/2;
                    else if(p==='2等 と 2等') calc = (y*(y-1))/2;
                    else if(p==='はずれ と はずれ') calc = (b*(b-1))/2;
                    else if(p==='1等 と 2等') calc = r*y;
                    else if(p==='1等 と はずれ') calc = r*b;
                    else if(p==='2等 と はずれ') calc = y*b;
                }
                answerText = `<b>${calc}</b> 通り`;
            }

            html += `<tr><td>${getColorIcon(col1)} ${col1}</td><td>${getColorIcon(col2)} ${col2}</td><td>${answerText}</td></tr>`;
        });

        tbody.innerHTML = html;
        document.getElementById('found-count').innerText = foundPatterns.length;

        if (isAllCompleted) {
            document.getElementById('cong-message').style.display = 'block';
            document.getElementById('math-card-box').classList.add('completed');
        } else {
            document.getElementById('cong-message').style.display = 'none';
            document.getElementById('math-card-box').classList.remove('completed');
        }
    }

    function getColorIcon(name) {
        if(name === '1等') return '🔴'; if(name === '2等') return '🟡'; return '🔵';
    }

    function handleButtonClick() {
        if(ballData.length < 2) return;

        if (currentMode === 'P') {
            if (stepState === 0) {
                const indices = getRandomTwoIndices();
                selectedBall1 = ballData[indices.i1]; selectedBall2 = ballData[indices.i2];
                revealBall('ball-1', selectedBall1);
                stepState = 1;
            } else if (stepState === 1) {
                revealBall('ball-2', selectedBall2);
                addResultToData(selectedBall1.name, selectedBall2.name);
                stepState = 2;
            } else if (stepState === 2) {
                clearHands(); stepState = 0;
            }
        } else {
            if (stepState === 0) {
                const indices = getRandomTwoIndices();
                selectedBall1 = ballData[indices.i1]; selectedBall2 = ballData[indices.i2];
                revealBall('ball-1', selectedBall1); revealBall('ball-2', selectedBall2);
                addResultToData(selectedBall1.name, selectedBall2.name);
                stepState = 2;
            } else if (stepState === 2) {
                clearHands(); stepState = 0;
            }
        }
        updateButtonText();
    }

    function clearHands() {
        const b1 = document.getElementById('ball-1'); const b2 = document.getElementById('ball-2');
        b1.className = 'picked-ball ball-hidden'; b1.innerText = '?';
        b2.className = 'picked-ball ball-hidden'; b2.innerText = '?';
    }

    function addResultToData(name1, name2) {
        let pKey = "";
        if (currentMode === 'P') {
            pKey = `${name1}|${name2}`;
        } else {
            let arr = [name1, name2];
            if (arr.includes('1等') && arr.includes('2等')) pKey = '1等 と 2等';
            else if (arr.includes('1等') && arr.includes('はずれ')) pKey = '1等 と はずれ';
            else if (arr.includes('2等') && arr.includes('はずれ')) pKey = '2等 と はずれ';
            else pKey = `${arr[0]} と ${arr[1]}`;
        }

        if (activePatterns.includes(pKey) && !foundPatterns.includes(pKey)) {
            foundPatterns.push(pKey);
            // ローカルストレージに保存
            const r = document.getElementById('count-red').value;
            const y = document.getElementById('count-yellow').value;
            const b = document.getElementById('count-blue').value;
            localStorage.setItem(`gacha_foundPatterns_${currentMode}_${r}_${y}_${b}`, JSON.stringify(foundPatterns));
        }
        renderTable();
    }

    function getRandomTwoIndices() {
        const i1 = Math.floor(Math.random() * ballData.length);
        let i2 = Math.floor(Math.random() * ballData.length);
        while(i1 === i2) i2 = Math.floor(Math.random() * ballData.length);
        return { i1: i1, i2: i2 };
    }

    function revealBall(elementId, ballInfo) {
        const el = document.getElementById(elementId);
        el.className = 'picked-ball ' + ballInfo.css + ' animate-pop';
        el.innerText = ballInfo.name.charAt(0);
    }

    // アプリ起動
    initApp();
</script>

</body>
</html>
